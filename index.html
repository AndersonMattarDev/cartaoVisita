<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anderson Mattar | Cartão Virtual</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 22px;
    }

    p {
      margin: 0 0 25px;
      font-size: 14px;
      opacity: 0.9;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .whatsapp {
      background: #25d366;
    }

    .email {
      background: #0072c6;
    }

    .instagram {
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
    }
    .last-project {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  box-shadow: 0 6px 15px rgba(37, 117, 252, 0.35);
}

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="foto.jpg" alt="Anderson Mattar" class="photo" />

    <h1>Anderson Mattar</h1>
    <p>Desenvolvimento Web • Manutenção • Redes</p>

    <a
      class="btn whatsapp"
      href="https://wa.me/5532984240038"
      target="_blank"
      rel="noopener noreferrer"
    >
      WhatsApp
    </a>

    <a
      class="btn email"
      href="mailto:andmat7745@hotmail.com"
    >
      E-mail
    </a>

    <a
      class="btn instagram"
      href="https://www.instagram.com/mattarandersonmoreno/"
      target="_blank"
      rel="noopener noreferrer"
    >
      Instagram
    </a>

    <a
      class="btn last-project"
      href="https://www.casadevioletapousada.com.br"
      target="_blank"
      rel="noopener noreferrer"
    >
      Último Projeto
    </a>

    <footer>
      Cartão de visitas virtual
    </footer>
  </div>
</body>
</html>
